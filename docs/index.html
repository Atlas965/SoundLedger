    <style>
      
@tailwind base;
@tailwind components;
@tailwind utilities;

:root {
  --font-display: 'Sora', sans-serif;
  --font-body: 'Plus Jakarta Sans', sans-serif;

  /* Deep Navy / Black Theme */
  --background: 226 47% 5%;
  --foreground: 210 40% 98%;
  
  --card: 226 40% 8%;
  --card-foreground: 210 40% 98%;
  
  --popover: 226 40% 8%;
  --popover-foreground: 210 40% 98%;
  
  /* Electric Cyan / Neon Blue Accent */
  --primary: 184 100% 50%;
  --primary-foreground: 226 47% 5%;
  
  --secondary: 226 30% 15%;
  --secondary-foreground: 210 40% 98%;
  
  --muted: 226 30% 15%;
  --muted-foreground: 215 20.2% 65.1%;
  
  --accent: 280 80% 60%; /* Purple secondary accent */
  --accent-foreground: 210 40% 98%;
  
  --destructive: 0 62.8% 30.6%;
  --destructive-foreground: 210 40% 98%;
  
  --border: 226 30% 15%;
  --input: 226 30% 15%;
  --ring: 184 100% 50%;
  
  --radius: 0.75rem;
}

@layer base {
  html {
    scroll-behavior: smooth;
  }
  
  body {
    @apply bg-background text-foreground antialiased selection:bg-primary/30 selection:text-primary;
    font-family: var(--font-body);
  }

  h1, h2, h3, h4, h5, h6 {
    font-family: var(--font-display);
    @apply font-bold tracking-tight;
  }
}

@layer utilities {
  .glass-panel {
    @apply bg-white/[0.03] backdrop-blur-xl border border-white/[0.08] shadow-[0_8px_32px_0_rgba(0,0,0,0.36)];
  }
  
  .glass-panel-hover {
    @apply hover:bg-white/[0.06] hover:border-white/[0.15] transition-all duration-300;
  }
  
  .text-gradient {
    @apply bg-clip-text text-transparent bg-gradient-to-r from-primary via-blue-400 to-accent;
  }
}
